name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Ler versão automaticamente
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json
          import re

          html_paths = [Path('www/index.html'), Path('index.html')]
          version = None

          for p in html_paths:
              if not p.exists():
                  continue
              s = p.read_text(encoding='utf-8', errors='ignore')
              m = re.search(r"APP_VERSION\s*=\s*['\"]([^'\"]+)['\"]", s)
              if not m:
                  m = re.search(r"v(\d+\.\d+\.\d+)", s)
              if m:
                  version = m.group(1)
                  break

          if not version and Path('package.json').exists():
              version = json.loads(Path('package.json').read_text(encoding='utf-8')).get('version')

          if not version:
              raise SystemExit("Não encontrei a versão. Defina const APP_VERSION='1.0.x' no www/index.html ou version no package.json.")

          parts = [int(x) for x in version.split('.')]
          while len(parts) < 3:
              parts.append(0)

          # Código alto para não sofrer downgrade em builds antigas.
          version_code = 2000000 + parts[0] * 1000000 + parts[1] * 1000 + parts[2]

          with open('version.env', 'w', encoding='utf-8') as f:
              f.write(f'APP_VERSION={version}\n')
              f.write(f'VERSION_CODE={version_code}\n')
              f.write(f'APK_NAME=corefit-v{version}.apk\n')

          print(f'APP_VERSION={version}')
          print(f'VERSION_CODE={version_code}')
          print(f'APK_NAME=corefit-v{version}.apk')
          PY

      - name: Exportar versão para o workflow
        shell: bash
        run: cat version.env >> "$GITHUB_ENV"

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Instalar dependências
        run: npm install

      - name: Usar assinatura fixa do APK
        shell: bash
        run: |
          mkdir -p ~/.android
          if [ -f "keystores/corefit-debug.keystore" ]; then
            cp keystores/corefit-debug.keystore ~/.android/debug.keystore
            chmod 600 ~/.android/debug.keystore
            echo "Keystore fixa copiada para ~/.android/debug.keystore"
            ls -l ~/.android/debug.keystore
          else
            echo "ERRO: keystores/corefit-debug.keystore não encontrado."
            exit 1
          fi

      - name: Criar projeto Android se ainda não existir
        shell: bash
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Definir permissões Android
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          txt = manifest.read_text(encoding='utf-8')

          perms = [
              '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
              '<uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />',
              '<uses-permission android:name="android.permission.WAKE_LOCK" />',
              '<uses-permission android:name="android.permission.VIBRATE" />',
              '<uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />',
              '<uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />'
          ]

          insert = '\n'.join(p for p in perms if p not in txt)
          if insert:
              txt = txt.replace('<application', insert + '\n\n    <application', 1)

          manifest.write_text(txt, encoding='utf-8')
          print('Permissões conferidas no AndroidManifest.xml')
          PY

      - name: Criar file_paths.xml
        shell: bash
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/file_paths.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <files-path name="files" path="." />
              <cache-path name="cache" path="." />
              <external-files-path name="external-files" path="." />
              <external-cache-path name="external-cache" path="." />
              <external-path name="external" path="." />
          </paths>
          EOF

      - name: Definir versionCode e versionName
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os
          import re

          version_code = os.environ['VERSION_CODE']
          version_name = os.environ['APP_VERSION']
          files = [Path('android/app/build.gradle'), Path('android/app/build.gradle.kts')]
          changed_any = False

          for p in files:
              if not p.exists():
                  continue

              s = p.read_text(encoding='utf-8')
              original = s

              # Groovy: versionCode 1 / versionName "1.0"
              s = re.sub(r'versionCode\s+\d+', f'versionCode {version_code}', s)
              s = re.sub(r'versionName\s+"[^"]*"', f'versionName "{version_name}"', s)

              # Kotlin DSL: versionCode = 1 / versionName = "1.0"
              s = re.sub(r'versionCode\s*=\s*\d+', f'versionCode = {version_code}', s)
              s = re.sub(r'versionName\s*=\s*"[^"]*"', f'versionName = "{version_name}"', s)

              p.write_text(s, encoding='utf-8')
              changed = s != original
              changed_any = changed_any or changed
              print(f'Arquivo conferido: {p}')
              for line in s.splitlines():
                  if 'versionCode' in line or 'versionName' in line:
                      print(line)

          if not changed_any:
              raise SystemExit('Não consegui alterar versionCode/versionName. Verifique android/app/build.gradle.')
          PY

      - name: Forçar assinatura fixa no Gradle
        shell: bash
        run: |
          if ! grep -q "corefit-debug.keystore" android/app/build.gradle; then
            cat >> android/app/build.gradle <<'EOF'

          // CoreFit: assinatura fixa para manter atualizações consistentes no GitHub Actions.
          android {
              signingConfigs {
                  corefitDebug {
                      storeFile file('../../keystores/corefit-debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
              }
              buildTypes {
                  debug {
                      signingConfig signingConfigs.corefitDebug
                  }
                  release {
                      signingConfig signingConfigs.corefitDebug
                  }
              }
          }
          EOF
          fi
          echo "Assinatura fixa conferida no android/app/build.gradle"
          grep -n "corefit-debug.keystore\|signingConfig" android/app/build.gradle || true

      - name: Dar permissão ao Gradle
        run: chmod +x android/gradlew

      - name: Gerar APK debug
        run: cd android && ./gradlew assembleDebug

      - name: Preparar APK com nome correto
        shell: bash
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/*.apk "release/${APK_NAME}"
          ls -lh "release/${APK_NAME}"

      - name: Criar ou atualizar GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "v${APP_VERSION}" >/dev/null 2>&1; then
            gh release upload "v${APP_VERSION}" "release/${APK_NAME}" --clobber
          else
            gh release create "v${APP_VERSION}" "release/${APK_NAME}" --title "Corefit v${APP_VERSION}" --notes "APK debug do Corefit v${APP_VERSION}."
          fi

      - name: Publicar APK para download no Actions
        uses: actions/upload-artifact@v4
        with:
          name: corefit-debug-apk-v${{ env.APP_VERSION }}
          path: release/${{ env.APK_NAME }}
