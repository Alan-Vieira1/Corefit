function prepComponentLine(name,amount,unit){const n=String(name||''),l=n.toLowerCase(); let v=Number(amount)||0; if(!v)return `${esc(n)}`; if(unit==='g'){

  else if(l.includes('frango')||l.includes('carne')||l.includes('peixe')||l.includes('tilápia')){raw=v/0.75;note='peso cru aproximado antes de grelhar/cozinhar'}
  else if(l.includes('cuscuz')){raw=v/1.7;note='flocão seco antes de hidratar'}
  else if(l.includes('batata')||l.includes('macaxeira')||l.includes('mandioca')){raw=v*1.08;note='peso cru/descascado aproximado'}

  else if(l.includes('iogurte'))return `${fmt(v)}g ${esc(n)} · usar gelado`;
  return `${fmt(Math.round(raw/5)*5)}g ${esc(n)} · ${note}`;
 }
 if(unit==='un')return `${fmt(Math.round(v))} un ${esc(n)} · usar unidade média`;

function foodFitInfo(f,meal=activeMeal(),isSuggested=false){const sf=scaledFood(f,meal),n=macroNeedFor(meal),g=n.g,t=n.room.total,ceil=n.room.ceil,proj={kcal:t.kcal+sf.kcal,p:t.p+sf.p,c:t.c+sf.c,f:t.f+sf.f,fi:t.fi+sf.fi}; const overP=Math.max(0,proj.p-ceil.p),overFi=Math.max(0,proj.fi-ceil.fi),overF=Math.max(0,proj.f-ceil.f),overC=Math.max(0,proj.c-ceil.c); const ctx=mealContext(meal,mealMinute(meal)); if(isSuggested)return {label:'Sugerido',cls:'suggestedTag',desc:suggestionReason(f,meal)}; if((ctx.role==='pre-light'||ctx.role==='pre-main')&&(f.tags||[]).includes('Pré-treino')&&sf.f<=7&&sf.fi<=5)return {label:ctx.role==='pre-light'?'Pré-treino leve':'Pré-treino',cls:'fitCarb',desc:ctx.role==='pre-light'?'Boa opção leve antes do treino, com foco em carbo e digestão fácil.':'Boa opção para funcionar como pré-treino principal.'}; if(overFi>1.5||(t.fi>=g.fi&&sf.fi>=2.5)||(n.room.raw.fi<3&&sf.fi>=3))return {label:'Atenção fibra',cls:'fitWarn',desc:'Pode usar, mas a fibra já está no limite; melhor escolher algo com pouca fibra se ainda faltar kcal.'}; if(overP>5||(t.p>=g.p&&sf.p>=14)||(n.room.raw.p<7&&sf.p>=15))return {label:'Atenção proteína',cls:'fitWarn',desc:'Pode usar, mas tende a passar proteína; melhor se ainda faltar proteína no dia.'}; if(overF>3||(n.room.raw.f<5&&sf.f>=8))return {label:'Atenção gordura',cls:'fitWarn',desc:'Pode usar, mas gordura está mais apertada nesse momento.'}; if((proj.c>g.c*1.30)||(overC>0&&proj.kcal>g.kcal*1.02))return {label:'Atenção carbo',cls:'fitWarn',desc:'Carbo passou bastante; só use se calorias ainda estiverem bem controladas ou perto do treino.'}; if((proj.c>g.c*1.15)&&(t.c>=g.c)&&sf.c>=22)return {label:'Atenção carbo',cls:'fitCarb',desc:'Carbo já está acima da meta; ainda pode usar, mas com moderação.'}; if(n.rem.kcal>150&&n.room.raw.p<12&&n.room.raw.fi<6&&sf.c>=18&&sf.p<=14&&sf.fi<=3)return {label:'Livre p/ kcal + carbo',cls:'fitCarb',desc:'Boa alternativa para fechar energia/carbo sem subir muito proteína e fibra.'}; const sc function daySummaryPhrase(){const {pairs}=daySummaryData(); const pctOf=n=>{const r=pairs.find(x=>x[0]===n);return r?macroPercent(r[1],r[2]):0}; if(!day().foods.length)return 'Ainda não há refeições registradas hoje.'; const p=pctOf('Proteína'),c=pctOf('Carboidrato'),fi=pctOf('Fibra'),k=pctOf('Calorias'); if(p>115&&c<90)return 'Proteína está alta e carbo ainda baixo. Próxima refeição deve priorizar carbo com pouca gordura/fibra.'; if(fi>115)return 'Fibra está alta. Evite somar psyllium, chia, aveia e salada em excesso no restante do dia.'; if(c<85&&k<95)return 'Carbo/calorias ainda baixos. Próxima refeição deve ajudar a fechar energia para o treino e o dia.'; if(k>110)return 'Calorias acima da meta. Próximas escolhas devem ser menores e com proteína/fibra controladas.'; return 'Dia bem encaminhado. Ajuste as próximas refeições pelo macro que ainda estiver mais baixo.'}

function weekHistoryHtml(){const g=targets(),today=dateFromISO(todayISO()),rows=[]; for(let i=6;i>=0;i--){const d=new Date(today); d.setDate(today.getDate()-i); const iso=isoFromDate(d),tt=totals(iso),foods=(state.days?.[iso]?.foods||[]).length; rows.push({iso,label:d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit'}),t:tt,foods})} const used=rows.filter(r=>r.foods); const avg=k=>used.length?used.reduce((a,r)=>a+num(r.t[k]),0)/used.length:0; const good=used.filter(r=>Math.abs(macroPercent(r.t.kcal,g.kcal)-100)<=15).length; return `<section class="card" style="margin-top:14px"><div class="sectiontitle"><div><h3>Histórico semanal de dieta</h3><div class="tiny muted">${used.length?`${used.length} dia(s) com registro · ${good} dentro da faixa de kcal`:'Sem registros suficientes esta semana.'}</div></div></div><div class="grid cols4">${progressCard('Kcal média',avg('kcal'),g.kcal,' kcal')}${progressCard('Proteína média',avg('p'),g.p,'g','good')}${progressCard('Carbo média',avg('c'),g.c,'g')}${progressCard('Fibra média',avg('fi'),g.fi,'g')}</div><div class="weekHistoryGrid" style="margin-top:12px">${rows.map(r=>`<div class="weekHistoryCard"><strong>${esc(r.label)}</strong><span>${r.foods?`${fmt(r.t.kcal)} kcal · P ${fmt(r.t.p)}g · C ${fmt(r.t.c)}g · Fibra ${fmt(r.t.fi)}g`:'sem registro'}</span></div>`).join('')}</div></section>`}

function openCopyYesterdayModal(){const y=new Date(dateFromISO(todayISO())); y.setDate(y.getDate()-1); const iso=isoFromDate(y),src=state.days?.[iso],foods=src?.foods||[]; if(!foods.length){infoModal('Ontem sem refeições','Não encontrei alimentos registrados ontem para copiar.',{icon:'📋'});return} const meal=activeMeal(),info=mealInfo(meal),same=foods.filter(x=>x.meal===meal).length; openModal(`<div class="sectiontitle"><div><h3>Copiar ontem</h3><div class="tiny muted">${foods.length} alimento(s) encontrados ontem.</div></div><button class="iconbtn" data-action="close-modal">×</button></div><div class="choiceGrid"><button class="choiceBtn" data-action="copy-yesterday-mode" data-mode="all"><strong>Copiar tudo</strong><span>Repete todas as refeições de ontem.</span></button><button class="choiceBtn" data-action="copy-yesterday-mode" data-mode="same"><strong>Copiar só ${esc(info[2])}</strong><span>${same||0} alimento(s) da mesma refeição.</span></button><button class="choiceBtn" data-action="copy-yesterday-mode" data-mode="nosupp"><strong>Copiar sem suplementos</strong><span>Ignora whey, caseína, albumina, hipercalórico e malto.</span></button><button class="choiceBtn" data-action="copy-yesterday-mode" data-mode="recalc"><strong>Copiar e recalcular porções</strong><span>Usa os alimentos de ontem, mas recalcula pelas metas de hoje.</span></button></div>`); $('#modalBox').classList.add('compact')}
function copyYesterday(mode='all'){const y=new Date(dateFromISO(todayISO())); y.setDate(y.getDate()-1); const iso=isoFromDate(y),src=state.days?.[iso]; if(!src||!(src.foods||[]).length){infoModal('Ontem sem refeições','Não encontrei alimentos registrados ontem para copiar.',{icon:'📋'});return} const suppWords=['whey','caseína','caseina','albumina','hipercalórico','hipercalorico','maltodextrina','malto']; let arr=(src.foods||[]).map(resolvedLoggedFood); if(mode==='same')arr=arr.filter(x=>x.meal===activeMeal()); if(mode==='nosupp')arr=arr.filter(x=>!suppWords.some(w=>String(x.name||'').toLowerCase().includes(w))); if(!arr.length){infoModal('Nada para copiar','Essa opção não encontrou alimentos compatíveis ontem.',{icon:'📋'});return} arr.forEach(x=>{let item={...x,logId:uid(),loggedAt:new Date().toISOString(),profileHash:profileScaleHash()}; if(mode==='recalc'&&x.sourceId){const srcFood=baseFoodById(x.sourceId); if(srcFood){const sf=scaledFood(srcFood,x.meal||activeMeal(),{ignoreRemaining:true}); item={...item,...sf,sourceId:srcFood.id,id:srcFood.id,profileHash:profileScaleHash()}}} day().foods.push(item)}); closeModal(); toast('Refeições de ontem copiadas'); commitState()}
function coherenceCheckHtml(){const g=targets(),t=totals(),p=state.profile,notes=[]; if(g.p/(num(p.weight)||90)>1.9)notes.push('Proteína alta para o peso. Evite somar muito whey + frango no mesmo dia.'); if(t.fi>g.fi+8)notes.push('Fibra acima do ideal. Psyllium + aveia pode pesar no intestino.'); if(activeMealIds().length<baseMealIds().length-1)notes.push('Muitas refeições puladas hoje: pode ficar difícil bater kcal sem exagerar depois.'); if(t.kcal<g.kcal*.75&&day().foods.length>=3)notes.push('Calorias ainda baixas para o número de refeições já feitas. Priorize carboidrato limpo nas próximas.'); if(num(p.calorieOffset))notes.push(`Meta calibrada manualmente em ${num(p.calorieOffset)>0?'+':''}${fmt(p.calorieOffset)} kcal/dia.`); supplementWarningNotes().forEach(n=>{if(!n.startsWith('Impacto moderado'))notes.push(n)}); return `<section class="card" style="margin-top:14px"><div class="sectiontitle"><div><h3>Check de coerência</h3><div class="tiny muted">Mostra só exceções reais. Se está tudo normal, fica silencioso.</div></div></div>${notes.length?`<div class="macroWarnList">${notes.map(n=>`<div class="macroWarnItem">${esc(n)}</div>`).join('')}</div>`:'<div class="empty">Tudo coerente. Nenhum alerta importante agora.</div>'}</section>`}

function dayImpossibleInfo(){
  const wanted=clamp(Math.round(num(state.profile.mealCount)||5),3,6),actual=activeMealIds().length,blocks=blockingWindows(),wake=minutesFromTime(effectiveWakeTime()),usable=maxDayMealMinute()-wake,tw=trainingWindow();
  const trainText=tw.end>tw.start?` Treino ${timeFromMinutes(tw.start)}–${timeFromMinutes(tw.end)} foi tratado como bloqueio real, não como “dia inteiro ocupado”.`:'';
  const severe=actual<=3&&wanted>=5;
  if(actual<wanted)return {bad:severe,title:'Agenda compacta',text:`Você escolheu ${wanted} refeições, mas hoje só couberam ${actual}.${trainText} O app tentou mover pós-treino, fundir pré-treino e encaixar lanches antes de reduzir.`};
  if(usable<660&&blocks.length>=2)return {bad:false,title:'Agenda compacta',text:'Sua janela útil está curta e há vários blocos ocupados. O app pode reduzir lanches para manter horários viáveis.'};
  if(wanted>=5&&usable>=840&&actual>=wanted&&tw.end>tw.start)return {bad:false,title:'Agenda viável',text:`${wanted} refeições cabem hoje. O treino só bloqueia ${timeFromMinutes(tw.start)}–${timeFromMinutes(tw.end)}.`};
  return null
}

function agendaReasons(){const ids=activeMealIds(),wanted=clamp(Math.round(num(state.profile.mealCount)||5),3,6),dinner=ids.includes('dinner')?mealMinute('dinner'):null,ds=daySettingsRaw(),out=[]; if(ds.noTraining)out.push('Treino desativado só hoje.'); if(ds.ignoreWeeklyRoutines)out.push('Rotinas semanais desativadas só hoje.'); if(ds.wakeTime)out.push(`Acordar especial hoje: ${ds.wakeTime}.`); if(ds.sleepTime)out.push(`Sono especial hoje: ${ds.sleepTime}.`); blockingWindows().forEach(w=>out.push(`${w.title} ocupa ${timeFromMinutes(w.start)}–${timeFromMinutes(w.end)}.`)); if(ids.length<wanted)out.push(`Agenda compacta para ${wanted} refeições: usando ${ids.length} refeições úteis.`); else out.push(`Janela útil comporta ${ids.length} refeição(ões). Pós-treino pode ficar próximo do almoço sem bloquear o dia.`); if(dinner&&nearSleep(dinner,120))out.push('Jantar ficou mais leve por estar perto do sono.'); supplementTimingWarnings().forEach(x=>out.push(x)); if(!out.length)out.push('Sem ajustes importantes hoje.'); return out}

function nextNativeAlert(){const now=new Date(),cur=now.getHours()*60+now.getMinutes(),items=alertItems().filter(x=>alertType(x.id,x.def)!=='off'); if(!items.length)return null; return items.map(x=>({...x,delta:x.min>=cur?x.min-cur:x.min+24*60-cur})).sort((a,b)=>a.delta-b.delta)[0]}

function readFileAsText(file){return new Promise((resolve,reject)=>{const r=new FileReader(); r.onload=()=>resolve(String(r.result||'')); r.onerror=()=>reject(new Error('Falha ao ler arquivo')); r.readAsText(file)})}

async function importBackupFile(file){try{let raw=''; const name=(file.name||'').toLowerCase(); if(name.endsWith('.zip')||String(file.type||'').includes('zip'))raw=await extractJsonTextFromZipBuffer(await readFileAsArrayBuffer(file)); else raw=await readFileAsText(file); importBackupText(raw)}catch(err){infoModal('Arquivo inválido',`Não consegui importar esse backup: ${err.message||err}.`,{icon:'⚠️'})}}
function extractBackupState(raw){if(typeof raw==='string'&&!raw.trim())throw new Error('O arquivo está vazio');let obj=typeof raw==='string'?JSON.parse(raw):raw; if(!obj||typeof obj!=='object')throw new Error('JSON vazio'); if(obj.profile&&obj.days)return obj; if(obj.state&&typeof obj.state==='object')return extractBackupState(obj.state); if(obj.data&&typeof obj.data==='object')return extractBackupState(obj.data); const keys=Object.keys(obj); const storeKey=keys.find(k=>/^corefit/i.test(k)&&typeof obj[k]==='string'); if(storeKey)return extractBackupState(obj[storeKey]); const stateLike=keys.map(k=>obj[k]).find(v=>v&&typeof v==='object'&&v.profile&&v.days); if(stateLike)return stateLike; throw new Error('Backup não reconhecido')}

function isCapacitorApp(){return !!(window.Capacitor&&window.Capacitor.Plugins)}

async function checkExactAlarmStatus(){const p=nativeNotifyPlugin(); if(!p||typeof p.checkExactNotificationSetting!=='function')return 'unknown'; try{return (await p.checkExactNotificationSetting()).exact_alarm||'unknown'}catch(e){return 'unknown'}}

async function requestNativePermissions(opts={}){const silent=opts===true||opts?.silent===true,p=nativeNotifyPlugin(); if(p){try{const res=await p.requestPermissions(); const exact=await checkExactAlarmStatus(); if(!silent)infoModal('Alertas e permissões',`Notificações: ${res.display||res.receive||'verifique o Android'}. Alarme exato: ${exact}.`,{icon:'✅'})}catch(err){if(!silent)infoModal('Alertas e permissões',`Não consegui pedir permissão nativa: ${err.message||err}`,{icon:'⚠️'})} return} if(typeof Notification==='undefined'){if(!silent)infoModal('Alertas','Este navegador não permite notificações.',{icon:'🔕'});return} Notification.requestPermission().then(p=>{if(!silent)infoModal('Alertas',p==='granted'?'Alertas permitidos no navegador.':'Permissão não concedida.',{icon:'🔔'})})}
function nextDateForMinute(min){const d=new Date(),cur=d.getHours()*60+d.getMinutes(); if(min<=cur)d.setDate(d.getDate()+1); d.setHours(Math.floor(min/60),min%60,0,0); return d}
function stableNotificationId(id,index=0){let h=0; String(id||index).split('').forEach(ch=>{h=((h<<5)-h)+ch.charCodeAt(0);h|=0}); return 10000+Math.abs(h%80000)}

async function scheduleNativeAlerts(opts={}){const silent=opts===true||opts?.silent===true,p=nativeNotifyPlugin(); if(!p){if(!silent)infoModal('Agendar avisos','Esta opção só funciona no APK. No navegador/HTML, use apenas “Permitir notificações”.',{icon:'🔔'});return false} let items=[]; try{items=alertItems().filter(x=>alertType(x.id,x.def)!=='off').slice(0,64)}catch(err){if(!silent)infoModal('Agendar avisos',`Não consegui montar a lista de avisos: ${err.message||err}`,{icon:'⚠️'});return false} if(!items.length){if(!silent)infoModal('Agendar avisos','Nenhum aviso ativo para agendar. Ative pelo menos uma refeição, treino ou rotina.',{icon:'🔕'});return false} try{await requestNativePermissions({silent:true}); await ensureNotificationChannels(p); let oldIds=[]; try{const pending=await p.getPending(); oldIds=(pending.notifications||[]).filter(n=>Number(n.id)>=10000&&Number(n.id)<90000).map(n=>({id:n.id}))}catch(e){} if(oldIds.length)await p.cancel({notifications:oldIds}); const notifications=items.map((x,i)=>{const type=alertType(x.id,x.def),alarm=type==='alarm',meta=ALERT_TYPE_META[type]||ALERT_TYPE_META.notify; return {id:stableNotificationId(x.id,i),title:`${alarm?'⏰':'🔔'} ${x.title||'Corefit'}`,body:`${x.time} · ${meta[1]} · ${x.desc||'Corefit'}`,channelId:alarm?'corefit_alarm':'corefit_notify',schedule:{at:nextDateForMinute(x.min),repeats:true,every:'day',allowWhileIdle:alarm},sound:alarm?'default':undefined,smallIcon:'ic_stat_icon'}}); await p.schedule({notifications}); if(!silent)infoModal('Avisos agendados',`${notifications.length} aviso(s) diário(s) foram enviados para o Android. Se editar horários, o Corefit tenta reagendar automaticamente; se não tocar, abra esta tela e toque em agendar novamente.`,{icon:'✅'}); return true}catch(err){if(!silent)infoModal('Agendar avisos',`Falha ao agendar no Android: ${err.message||err}. Verifique Notificações, Alarmes e lembretes e Bateria sem restrição.`,{icon:'⚠️'});return false}}
async function testNativeAlert(){const p=nativeNotifyPlugin(); if(!p){infoModal('Teste de alarme','Este teste só funciona no APK. No navegador/HTML, notificações fortes do Android não estão disponíveis.',{icon:'🔕'});return false} try{await requestNativePermissions({silent:true}); await ensureNotificationChannels(p); const id=99991; try{await p.cancel({notifications:[{id}]})}catch(e){} await p.schedule({notifications:[{id,title:'⏰ CoreFit teste',body:'Se isto tocou, o canal nativo está funcionando. Se não tocou, revise bateria/permissões.',channelId:'corefit_alarm',schedule:{at:new Date(Date.now()+60000),allowWhileIdle:true},sound:'default',smallIcon:'ic_stat_icon'}]}); infoModal('Teste agendado','Agendei um alarme de teste para tocar em aproximadamente 1 minuto. Se não tocar, libere Notificações, Alarmes e lembretes e Bateria sem restrição para o CoreFit.',{icon:'⏰'}); return true}catch(err){infoModal('Teste de alarme',`Falha ao agendar o teste: ${err.message||err}.`,{icon:'⚠️'});return false}}

const APP_VERSION='1.0.1';
const UPDATE_REPO='Alan-Vieira1/Corefit';
const UPDATE_API=`https://api.github.com/repos/${UPDATE_REPO}/releases/latest`;
let updateBannerTimer=null;
let lastUpdateInfo=null;
function versionNums(v){return String(v||'0').replace(/^v/i,'').split('.').map(x=>parseInt(x,10)||0)}
function isNewerVersion(latest,current=APP_VERSION){const a=versionNums(latest),b=versionNums(current),n=Math.max(a.length,b.length);for(let i=0;i<n;i++){if((a[i]||0)>(b[i]||0))return true;if((a[i]||0)<(b[i]||0))return false}return false}

function releaseApkUrl(rel){const assets=rel?.assets||[]; const apk=assets.find(x=>/\.apk$/i.test(x.name||''))||assets.find(x=>/corefit/i.test(x.name||'')); return apk?.browser_download_url||''}
function releasePageUrl(rel){return rel?.html_url||''}
async function checkForUpdates(opts={}){const silent=opts.silent!==false; try{const res=await fetch(UPDATE_API,{cache:'no-store',headers:{'Accept':'application/vnd.github+json'}}); if(!res.ok)throw new Error(`GitHub respondeu ${res.status}`); const rel=await res.json(),version=String(rel.tag_name||rel.name||'').replace(/^v/i,''),url=releaseApkUrl(rel),releaseUrl=releasePageUrl(rel)||url; state.app=state.app||{}; state.app.lastUpdateCheck=new Date().toISOString(); save(); if(version&&isNewerVersion(version)&&releaseUrl){lastUpdateInfo={version,url,releaseUrl,apkUrl:url}; if(state.app.dismissedUpdateVersion!==version)showUpdateBanner(lastUpdateInfo); if(!silent)infoModal('Atualização disponível',`Existe uma nova versão do Corefit: v${version}. Você pode baixar dentro do app ou abrir pelo navegador.`,{icon:'⬇️'}); return lastUpdateInfo} if(!silent)infoModal('Corefit atualizado',`Você já está na versão v${APP_VERSION}.`,{icon:'✅'}); return null}catch(err){if(!silent)infoModal('Atualização',`Não consegui verificar agora: ${err.message||err}.`,{icon:'⚠️'}); return null}}
function showUpdateBanner(info){if(!info||!(info.releaseUrl||info.url))return; clearTimeout(updateBannerTimer); let el=document.getElementById('updateBanner'); if(!el){el=document.createElement('div'); el.id='updateBanner'; document.body.appendChild(el)} el.className='updateBanner'; el.innerHTML=`<div><h4>Nova versão disponível: v${esc(info.version)}</h4><p>Baixe dentro do app ou abra a Release se o Android bloquear a instalação.</p></div><div class="updateBannerActions"><button class="btn primary small" data-action="download-update">Atualizar</button><button class="iconbtn small" data-action="dismiss-update">×</button></div>`; updateBannerTimer=setTimeout(()=>hideUpdateBanner(false),10000)}
function hideUpdateBanner(markDismiss=true){const el=document.getElementById('updateBanner'); if(el)el.remove(); clearTimeout(updateBannerTimer); if(markDismiss&&lastUpdateInfo?.version){state.app=state.app||{}; state.app.dismissedUpdateVersion=lastUpdateInfo.version; save()}}
async function openExternalUrl(url){if(!url)return false; try{const Browser=window.Capacitor?.Plugins?.Browser; if(Browser?.open){await Browser.open({url,windowName:'_system'}); return true}}catch(e){} try{const App=window.Capacitor?.Plugins?.AppLauncher; if(App?.openUrl){await App.openUrl({url}); return true}}catch(e){} try{window.open(url,'_system')||window.open(url,'_blank')||(location.href=url); return true}catch(e){try{location.href=url;return true}catch(_){return false}}}
function copyUpdateLink(){const url=lastUpdateInfo?.releaseUrl||lastUpdateInfo?.url||''; if(!url)return; if(navigator.clipboard?.writeText)navigator.clipboard.writeText(url).then(()=>toast('Link copiado')).catch(()=>toast('Não consegui copiar')); else toast(url)}

async function downloadUpdateInsideApp(){const info=lastUpdateInfo; const url=info?.apkUrl||info?.url; if(!url){infoModal('Atualização','Não encontrei o link direto do APK. Abra a Release pelo navegador.',{icon:'⚠️'});return} const cap=window.Capacitor?.Plugins||{},Filesystem=cap.Filesystem,FileTransfer=cap.FileTransfer; if(!Filesystem||!FileTransfer){infoModal('Download interno','Este APK ainda não tem os plugins nativos de download interno. Instale esta versão pelo navegador uma vez; depois as próximas podem baixar dentro do app.',{icon:'⚠️'});return} const fileName=`corefit-v${info.version||'nova'}.apk`; try{updateDownloadModal(info.version,0,'Preparando arquivo...'); const fileInfo=await Filesystem.getUri({directory:'CACHE',path:fileName}); let handle=null; if(FileTransfer.addListener){handle=await FileTransfer.addListener('progress',p=>{const total=Number(p.contentLength||p.totalBytes||0),done=Number(p.bytes||p.bytesWritten||0); const val=total>0?Math.min(100,Math.round(done/total*100)):0; if(val>0)updateDownloadModal(info.version,val,'Baixando dentro do app...')})} await FileTransfer.downloadFile({url,path:fileInfo.uri,progress:true}); if(handle&&handle.remove)try{handle.remove()}catch(e){} updateDownloadModal(info.version,100,'Download concluído. Abrindo instalador do Android...'); const opened=await openDownloadedApk(fileInfo.uri); if(!opened)infoModal('Download concluído',`APK baixado no cache do app, mas não consegui abrir o instalador automaticamente. Use “Abrir Release” como alternativa.`,{icon:'✅'}); else infoModal('Instalação','O Android deve abrir a tela de instalação. Se pedir permissão para instalar apps desconhecidos, permita o Corefit.',{icon:'✅'})}catch(err){infoModal('Download interno',`Falha no download interno: ${err.message||err}. Tente abrir a Release no navegador externo.`,{icon:'⚠️'})}}

function openNumberModal(target){let current=0,label='',unit='',min=0,max=0,step=1; if(target==='profile.weight'){current=num(state.profile.weight)||90;label='Peso';unit='kg';min=45;max=180} if(target==='profile.height'){current=num(state.profile.height)||172;label='Altura';unit='cm';min=140;max=220} if(target==='profile.age'){current=num(state.profile.age)||28;label='Idade';unit='anos';min=12;max=90} state.numberTarget=target; const vals=[]; for(let v=min;v<=max;v+=step)vals.push(v); openModal(`<div class="sectiontitle"><div><h3>Selecionar ${label}</h3><div class="tiny muted">Atual: ${current} ${unit}</div></div><button class="iconbtn" data-action="close-modal">×</button></div><div class="numberGrid">${vals.map(v=>`<button class="numberOption ${Number(v)===Number(current)?'active':''}" data-action="choose-number" data-value="${v}">${v}</button>`).join('')}</div><div class="field" style="margin-top:12px"><label>Valor exato</label><input id="exactNumber" type="number" value="${current}" min="${min}" max="${max}"></div><button class="btn primary" style="width:100%;margin-top:10px" data-action="choose-exact-number">Aplicar</button>`)}

r personalizado</button></div><div class="quickrow" style="margin-top:14px"><button class="btn bad" data-action="disable-whey">Desativar whey</button></div>`)}
function openTimeModal(target){if(target==='routine-start'||target==='routine-end'){state.tempRoutineEditing=state.editingRoutine;state.tempRoutineDraft=routineFormDraft()}state.timeTarget=target;let current='07:00'; if(target==='alarm')current=$('#alTime')?.value||'08:00'; else if(target==='routine-start')current=$('#rtTime')?.value||'08:00'; else if(target==='routine-end')current=$('#rtEndTime')?.value||'09:00'; else if(target.startsWith('profile.'))current=state.profile[target.split('.')[1]]||'07:00'; else if(target.startsWith('atypical.'))current=daySettingsRaw()[target.split('.')[1]]||state.profile[target.split('.')[1]]||'07:00'; else if(target.startsWith('meal.'))current=state.profile.mealTimeOverrides[target.split('.')[1]]||timeFromMinutes(recommendedMealMinutes()[target.split('.')[1]]); const quick=[]; const base=minutesFromTime(current); [-60,-30,-15,0,15,30,60].forEach(d=>quick.push(timeFromMinutes(base+d))); openModal(`<div class="sectiontitle"><div><h3>Selecionar horário</h3><div class="tiny muted">Use os botões para ajustar os minutos com precisão.</div></div><button class="iconbtn" data-action="close-modal">×</button></div><div class="subcard timePickerBox"><div class="tiny muted">Horário escolhido</div><strong id="timePickerCurrent" style="font-size:34px;display:block;margin-top:6px">${current}</strong><input id="exactTime" type="time" step="60" value="${current}" style="width:100%;margin-top:10px"></div><div class="timeAdjustGrid" style="margin-top:12px"><button class="btn" data-action="adjust-time" data-delta="-60">-1h</button><button class="btn" data-action="adjust-time" data-delta="60">+1h</button><button class="btn" data-action="adjust-time" data-delta="-15">-15</button><button class="btn" data-action="adjust-time" data-delta="15">+15</button><button class="btn" data-action="adjust-time" data-delta="-5">-5</button><button class="btn" data-action="adjust-time" data-delta="5">+5</button><button class="btn" data-action="adjust-time" data-delta="-1"> function normalizeExercise(e={}){const ex=Array.isArray(e)?{name:e[0],sets:e[1],reps:e[2],kg:e[3]}:{...e}; if(!ex.id)ex.id=uid(); if(ex.cardio){ex.sets=ex.sets||'1'; ex.minutes=ex.minutes||parseInt(String(ex.reps||'30').match(/\\d+/)?.[0]||30); ex.reps=`${ex.minutes} min`; ex.kg=ex.kg||ex.speed||'5 km/h'; ex.speed=ex.speed||ex.kg} else {ex.sets=ex.sets||'3'; ex.reps=ex.reps||'8–12'; ex.kg=ex.kg||''} return ex}

let nativeScheduleTimer=null;
function autoRescheduleNativeAlerts(){if(!nativeNotifyPlugin())return; clearTimeout(nativeScheduleTimer); nativeScheduleTimer=setTimeout(()=>scheduleNativeAlerts({silent:true}),900)}
function checkAlarms(){
  const now=new Date(),hm=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const due=[];
  for(const a of alertItems()){
    if(alertType(a.id,a.def)==='off'||a.time!==hm)continue;
    due.push(a);
  }
  if(!due.length)return;
  const key=`${todayISO()}_${hm}_${due.map(x=>`${x.id}:${alertType(x.id,x.def)}`).join('|')}`;
  if(state.lastAlarmKey===key)return;
  state.lastAlarmKey=key; save();
  const alarms=due.filter(x=>alertType(x.id,x.def)==='alarm'), icon=alarms.length?'⏰':'🔔', title=alarms.length?(due.length>1?'Despertadores e avisos':'Despertador'):(due.length>1?'Notificações':'Notificação');
  const body=due.map(x=>`${x.time} · ${x.title}`).join('<br>');
  infoModal(`${icon} ${title}`,body,{icon});
}
function applyNumberChoice(v){const target=state.numberTarget;if(!target)return;v=num(v); if(target==='profile.weight')state.profile.weight=clamp(v,45,180); if(target==='profile.height')state.profile.height=clamp(v,140,220); if(target==='profile.age')state.profile.age=clamp(Math.round(v),12,90); closeModal();render()}
function applyTimeChoice(t){
  const target=state.timeTarget;if(!target)return;
  t=timeFromMinutes(minutesFromTime(t));
  if(target==='alarm'){const inp=$('#alTime'); if(inp)inp.value=t; closeModal();toast(`Horário ${t} selecionado`);return}
  if(target==='routine-start'||target==='routine-end'){
    const editId=state.tempRoutineEditing||state.editingRoutine||null; if(!state.tempRoutineDraft)state.tempRoutineDraft={};
    if(target==='routine-start')state.tempRoutineDraft.time=t; else state.tempRoutineDraft.endTime=t;
    closeModal();openRoutineModal(editId);autoRescheduleNativeAlerts();return
  }
  if(target.startsWith('profile.')){
    const k=target.split('.')[1]; state.profile[k]=t;
    if(k==='trainStart'){
      let st=minutesFromTime(state.profile.trainStart),en=minutesFromTime(state.profile.trainEnd||'');
      if(!en||en<=st)state.profile.trainEnd=timeFromMinutes(st+120);
    }
    if(k==='trainEnd'){
      let st=minutesFromTime(state.profile.trainStart||''),en=minutesFromTime(state.profile.trainEnd);
      if(en<=st)state.profile.trainEnd=timeFromMinutes(st+90);
    }
    memo={}; closeModal();render();autoRescheduleNativeAlerts();return
  }
  if(target.startsWith('atypical.')){day().daySettings[target.split('.')[1]]=t; memo={}; closeModal();render();autoRescheduleNativeAlerts();return}
  if(target.startsWith('meal.')){const id=target.split('.')[1]; state.profile.mealTimeOverrides[id]=t; memo={}; closeModal();render();autoRescheduleNativeAlerts();return}
}
